# freqtrade-okx — dry-run bot 常駐部署（VPS / 任何 Docker 主機）
#
# 用官方 freqtrade image（已內含 TA-Lib / CCXT，免自行編譯）。
# 單一 DonchianBreakout service，獨立 sqlite 錢包。
#
# 啟動：  docker compose up -d        （或 make up）
# 看 log：docker compose logs -f      （或 make logs）
# 停止：  docker compose down         （或 make down）
#
# UI port 對外發佈（0.0.0.0）。公網安全性靠雲端防火牆的「來源 IP 白名單」把關
# （如 Lightsail：限制 8080 只允許你的固定 IP）。仍建議換掉 config.json 的弱密碼。
# 若改回只走 SSH tunnel，把各 service 的 "8080:8080" 改成 "127.0.0.1:8080:8080"。

x-ft-common: &ft-common
  # 建議改成與本機 `uv run freqtrade --version` 相同的版本 tag 以求可重現，
  # 例如 freqtradeorg/freqtrade:2026.5。預設用 stable。
  image: freqtradeorg/freqtrade:stable
  restart: unless-stopped
  volumes:
    - ./user_data:/freqtrade/user_data
  environment:
    # 容器內必須聽 0.0.0.0 才能透過 docker port 對外；不改動本機 config.json。
    - FREQTRADE__API_SERVER__LISTEN_IP_ADDRESS=0.0.0.0
  # 容器健康檢查：API server 回應即視為存活
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  donchian:
    <<: *ft-common
    container_name: ft-donchian
    ports:
      - "8080:8080"
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy DonchianBreakout
      --db-url sqlite:////freqtrade/user_data/donchian.dryrun.sqlite

  # 對照組：社群最廣泛使用的 NostalgiaForInfinity（X7）。5m、VolumePairList ~60 檔 USDT。
  # 純 dry-run 對照用，獨立錢包與 UI（8081）。策略碼為第三方（73k 行），自負風險。
  nfi:
    <<: *ft-common
    container_name: ft-nfi
    ports:
      - "8081:8081"
    command: >
      trade
      --config /freqtrade/user_data/config.nfi.json
      --strategy NostalgiaForInfinityX7
      --db-url sqlite:////freqtrade/user_data/nfi.dryrun.sqlite
